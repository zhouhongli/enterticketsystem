<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户注册 - 企业售后工单系统</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body data-auth-page="register">
  <main class="page auth-page">
    <h1 class="page-title">注册客户账号</h1>
    <section class="panel">
      <div class="feedback" data-feedback>注册只创建客户账号，不提供客服或管理员注册入口。</div>
      <form data-register-form>
        <div class="form-row">
          <label for="username">用户名 *</label>
          <input id="username" name="username" autocomplete="username" minlength="3" maxlength="50" required>
        </div>
        <div class="form-row">
          <label for="email">电子邮箱 *</label>
          <input id="email" name="email" type="email" autocomplete="email" maxlength="254" required>
        </div>
        <div class="form-row">
          <label for="password">密码 *</label>
          <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" maxlength="128" required>
        </div>
        <div class="form-row">
          <label for="confirm-password">确认密码 *</label>
          <input id="confirm-password" name="confirm_password" type="password" autocomplete="new-password" minlength="8" maxlength="128" required>
        </div>
        <div class="actions">
          <button type="submit">注册</button>
          <a class="button secondary" href="/pages/login.html">返回登录</a>
        </div>
      </form>
    </section>
  </main>
  <script type="module" src="/assets/js/auth-pages.js"></script>
</body>
</html>
