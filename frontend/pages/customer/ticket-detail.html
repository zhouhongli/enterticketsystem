<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工单详情 - 企业售后工单系统</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body data-customer-page="ticket-detail">
  <header class="app-header">
    <div class="brand">企业售后工单系统</div>
    <div class="identity" data-identity>zhangsan｜客户｜退出</div>
  </header>
  <nav class="nav">
    <a href="/pages/customer/tickets.html">我的工单</a>
    <a href="/pages/customer/ticket-new.html">新建工单</a>
  </nav>
  <main class="page">
    <h1 class="page-title">工单详情</h1>
    <div class="feedback" data-feedback>正在加载工单详情...</div>
    <section class="panel" data-ticket-content data-ticket-detail>
      <h2>工单概要</h2>
      <p>标题：<span data-ticket-title>正在加载...</span></p>
      <p>分类：<span data-ticket-category>正在加载...</span></p>
      <p>状态：<span class="status" data-ticket-status>正在加载...</span></p>
      <p>创建时间：<span data-ticket-created>正在加载...</span></p>
      <p>更新时间：<span data-ticket-updated>正在加载...</span></p>
    </section>
    <section class="panel" data-ticket-content>
      <h2>问题描述</h2>
      <p data-ticket-description>正在加载...</p>
    </section>
    <section class="panel" data-ticket-content>
      <h2>公开留言</h2>
      <div class="message-list" data-message-list>
        <div class="meta">正在加载...</div>
      </div>
    </section>
    <section class="panel" data-message-form-panel>
      <h2>新增留言</h2>
      <form data-message-form>
        <div class="form-row">
          <label for="message-content">留言内容 *</label>
          <textarea id="message-content" name="content" maxlength="2000" required></textarea>
        </div>
        <div class="actions"><button type="submit">发送留言</button></div>
      </form>
    </section>
    <div class="empty" data-closed-notice hidden>该工单已关闭，不能继续留言。</div>
  </main>
  <script type="module" src="/assets/js/session-ui.js"></script>
  <script type="module" src="/assets/js/customer-tickets.js"></script>
</body>
</html>
